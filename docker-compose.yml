services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-devtrack}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-devtrack}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Next.js App ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-devtrack}
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: ${APP_URL}
      AUTH_URL: ${APP_URL}
      NEXT_PUBLIC_APP_URL: ${APP_URL}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-DevTrack}
      NEXT_PUBLIC_WORK_HOURS_START: ${NEXT_PUBLIC_WORK_HOURS_START:-09:00}
      NEXT_PUBLIC_WORK_HOURS_END: ${NEXT_PUBLIC_WORK_HOURS_END:-18:00}
      NEXT_PUBLIC_LATE_THRESHOLD_MINUTES: ${NEXT_PUBLIC_LATE_THRESHOLD_MINUTES:-15}
      NEXT_PUBLIC_MIN_HOURS_PER_DAY: ${NEXT_PUBLIC_MIN_HOURS_PER_DAY:-6}
      NEXT_PUBLIC_PASSING_SCORE: ${NEXT_PUBLIC_PASSING_SCORE:-3.0}
      NEXT_PUBLIC_INTERNSHIP_WEEKS: ${NEXT_PUBLIC_INTERNSHIP_WEEKS:-12}
      PORT: 3000
      HOSTNAME: "0.0.0.0"
    ports:
      - "3003:3003"

volumes:
  postgres_data:
